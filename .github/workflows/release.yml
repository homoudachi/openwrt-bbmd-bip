name: Build OpenWrt Package Release

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version (e.g. 25.12.2)'
        required: true
        default: '25.12.2'
      target:
        description: 'Target (e.g. ath79/generic)'
        required: true
        default: 'ath79/generic'
      variant:
        description: 'TLS backend'
        required: true
        type: choice
        options:
          - openssl
          - mbedtls
        default: 'openssl'

jobs:
  build:
    name: Build ${{ inputs.target }} (${{ inputs.variant }})
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download OpenWrt SDK
        run: |
          BASE="https://downloads.openwrt.org/releases/${{ inputs.openwrt_version }}/targets/${{ inputs.target }}"
          PAGE=$(curl -sL "$BASE/")
          # Try .zst first (OpenWrt 25.12+), then .xz (older releases)
          SDK_FILE=$(echo "$PAGE" | grep -o 'openwrt-sdk-[^"]*\.tar\.zst' | head -1)
          if [ -z "$SDK_FILE" ]; then
            SDK_FILE=$(echo "$PAGE" | grep -o 'openwrt-sdk-[^"]*\.tar\.xz' | head -1)
          fi
          if [ -z "$SDK_FILE" ]; then
            echo "Failed to find SDK for ${{ inputs.target }} at $BASE"
            echo "--- Page excerpt: ---"
            echo "$PAGE" | grep -i sdk | head -5
            exit 1
          fi
          echo "Downloading: $BASE/$SDK_FILE"
          wget -nv "$BASE/$SDK_FILE"
          mkdir -p sdk
          if echo "$SDK_FILE" | grep -q '\.zst$'; then
            tar --zstd -xf "$SDK_FILE" --strip-components=1 -C sdk
          else
            tar xf "$SDK_FILE" --strip-components=1 -C sdk
          fi

      - name: Prepare package
        run: |
          mkdir -p sdk/package/bbmd sdk/dl
          cp Makefile sdk/package/bbmd/
          cp Config.in sdk/package/bbmd/ 2>/dev/null || true
          cp -r files/* sdk/package/bbmd/ 2>/dev/null || true

          # Create source tarball (OpenWrt build system finds it in dl/)
          git archive --format=tar.gz --prefix="bbmd-1.0.0/" -o "sdk/dl/bbmd-1.0.0.tar.gz" HEAD

          # Rewrite Makefile to use local tarball instead of git clone
          # PKG_SOURCE and PKG_SOURCE_URL must be defined before include $(INCLUDE_DIR)/package.mk
          sed -i 's|PKG_SOURCE_PROTO:=git|PKG_SOURCE:=bbmd-1.0.0.tar.gz|' sdk/package/bbmd/Makefile
          sed -i '/PKG_SOURCE_URL:=https:\/\/github.com/d' sdk/package/bbmd/Makefile
          sed -i '/PKG_SOURCE_DATE/d' sdk/package/bbmd/Makefile
          sed -i '/PKG_SOURCE_VERSION/d' sdk/package/bbmd/Makefile
          # Insert PKG_SOURCE_URL after PKG_SOURCE, before PKG_MIRROR_HASH
          sed -i '/PKG_SOURCE:=bbmd-1.0.0.tar.gz/a PKG_SOURCE_URL:=file://\$(CURDIR)/dl/' sdk/package/bbmd/Makefile

      - name: Update feeds
        run: |
          cd sdk
          # Only install required feed packages (avoid broken deps from telephony/video feeds)
          ./scripts/feeds update packages
          if [ "${{ inputs.variant }}" = "mbedtls" ]; then
            ./scripts/feeds install libwebsockets-mbedtls
          else
            ./scripts/feeds install libwebsockets-full
          fi

      - name: Build package
        run: |
          cd sdk
          # Disable SELinux to break SDK recursive dependency (busybox-selinux <-> base-files)
          sed -i '/CONFIG_BUSYBOX_SELINUX/d' .config
          sed -i '/CONFIG_BUSYBOX_DEFAULT_SELINUX/d' .config
          echo "# CONFIG_BUSYBOX_SELINUX is not set" >> .config
          echo "# CONFIG_BUSYBOX_DEFAULT_SELINUX is not set" >> .config
          echo "CONFIG_PACKAGE_bbmd-${{ inputs.variant }}=y" >> .config
          TERM=dumb make defconfig V=s 2>&1
          TERM=dumb make package/bbmd-${{ inputs.variant }}/compile V=s 2>&1

      - name: Find artifacts
        run: |
          find sdk/bin -name "bbmd*.ipk" -exec ls -lh {} \;

      - uses: actions/upload-artifact@v4
        with:
          name: bbmd-${{ inputs.openwrt_version }}-${{ inputs.target }}-${{ inputs.variant }}
          path: sdk/bin/packages/**/base/bbmd*.ipk
